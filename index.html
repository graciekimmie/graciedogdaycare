<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <style>
        body { font-family: sans-serif; background-color: #FFF5F6; color: #4A4A4A; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; }
        .music-btn { background: #FFD1DC; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
        .dog-card { border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 15px; text-align: center; }
        .dog-img { width: 100%; border-radius: 15px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .email-btn { background: #E9B2BF; color: white; border: none; padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <audio id="audioPlayer" src="island_in_the_sun.mp3"></audio>
    <button class="music-btn" onclick="toggleMusic()" id="musicBtn">Play MUSIC</button>

    <div class="container">
        <h1>Momo Dog Sitting</h1>
        
        <!-- Dog Gallery -->
        <div class="dog-card">
            <img src="IMG_6146.jpg" alt="Mocha" class="dog-img">
            <h3>Mocha</h3>
        </div>
        <div class="dog-card">
            <img src="IMG_6145.jpg" alt="Toto" class="dog-img">
            <h3>Toto</h3>
        </div>

        <!-- Booking Request -->
        <h2>📅 Booking Request</h2>
        <form id="bookingForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="text" id="puppyName" placeholder="Puppy's Name" required>
            <input type="date" id="checkIn" placeholder="Check-In Date" required>
            <input type="date" id="checkOut" placeholder="Check-Out Date" required>
            <textarea id="notes" placeholder="Special Notes"></textarea>
            
            <button type="button" class="email-btn" onclick="sendEmail()">
                Email me these booking details ✉️
            </button>
        </form>
    </div>

    <script>
        function toggleMusic() {
            const audio = document.getElementById('audioPlayer');
            const btn = document.getElementById('musicBtn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "Pause MUSIC";
            } else {
                audio.pause();
                btn.innerText = "Play MUSIC";
            }
        }

        function sendEmail() {
            const name = document.getElementById('name').value;
            const puppy = document.getElementById('puppyName').value;
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const notes = document.getElementById('notes').value;

            const body = `Name: ${name}%0APuppy: ${puppy}%0ACheck-In: ${checkIn}%0ACheck-Out: ${checkOut}%0ANotes: ${notes}`;
            window.location.href = `mailto:grace.de.kim@gmail.com?subject=Booking Request&body=${body}`;
        }
    </script>
</body>
</html>
