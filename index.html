<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #FFF5F6; color: #4A4A4A; }

        /* --- Music Button (Top Right) --- */
        .music-nav {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        #playMusicBtn {
            background: #FFD1DC;
            border: 2px solid #D06A80;
            color: #D06A80;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #playMusicBtn:hover { background: #E8B5C0; }

        /* ... (Keep all your other existing CSS here) ... */
        header { background-color: #FFD1DC; text-align: center; padding: 70px 20px; }
        .booking-container { background: #FFFFFF; border-radius: 24px; padding: 40px; max-width: 600px; margin: 20px auto; }
        .submit-btn { width: 100%; background-color: #F0C4CE; border: none; padding: 15px; border-radius: 30px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="music-nav">
        <button id="playMusicBtn">🎵 Play Music</button>
    </div>
    <audio id="audioElement" loop>
        <source src="https://archive.org/download/Weezer_2021-09-03/14%20Island%20In%20The%20Sun.mp3" type="audio/mpeg">
    </audio>

    <header>
        <h1>🐶 Momo Dog Sitting</h1>
    </header>

    <main class="booking-container">
        <form id="bookingForm">
            <button type="submit" class="submit-btn">Email me these booking details ✉️</button>
        </form>
    </main>

    <script>
        const btn = document.getElementById('playMusicBtn');
        const audio = document.getElementById('audioElement');

        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "🎵 Pause Music";
            } else {
                audio.pause();
                btn.innerHTML = "🎵 Play Music";
            }
        });

        // Booking form email logic
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = "mailto:grace.de.kim@gmail.com?subject=Booking Request&body=Details go here...";
        });
    </script>
</body>
</html>
