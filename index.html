<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #FFF5F6;
            color: #4A4A4A;
        }

        header {
            background-color: #FFD1DC;
            text-align: center;
            padding: 70px 20px 60px 20px;
            position: relative;
        }

        /* --- Simple Native Music Button Widget --- */
        .music-widget {
            position: fixed;
            top: 25px;
            right: 130px; 
            z-index: 100;
        }

        .music-btn {
            background: #FFF0F2;
            color: #D06A80;
            border: 2px solid #FFD1DC;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .music-btn:hover {
            transform: translateY(-2px);
            background-color: #FFE3E8;
            box-shadow: 0 8px 22px rgba(208, 106, 128, 0.25);
        }

        .music-btn.playing {
            background-color: #D06A80;
            color: #FFFFFF;
            border-color: #D06A80;
        }

        /* --- Instagram Badge --- */
        .ig-top-badge {

            top: 25px;
            right: 25px;
            background: #FFF0F2;
            width: 85px;
            height: 85px;
            border-radius: 18px;
            text-decoration: none;
            color: #D06A80;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFD1DC;
            z-index: 10;
        }
