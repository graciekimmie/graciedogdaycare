<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #FFF5F6;
            color: #4A4A4A;
        }

        header {
            background-color: #FFD1DC;
            text-align: center;
            padding: 70px 20px 60px 20px;
            position: relative;
        }

        /* --- Custom Music Button Widget --- */
        .music-widget {
            position: fixed;
            top: 25px;
            right: 130px; 
            z-index: 100;
        }

        .music-btn {
            background: #FFF0F2;
            color: #D06A80;
            border: 2px solid #FFD1DC;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .music-btn:hover {
            transform: translateY(-2px);
            background-color: #FFE3E8;
            box-shadow: 0 8px 22px rgba(208, 106, 128, 0.25);
        }

        .music-btn.playing {
            background-color: #D06A80;
            color: #FFFFFF;
            border-color: #D06A80;
        }

        /* --- Instagram Badge --- */
        .ig-top-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #FFF0F2;
            width: 85px;
            height: 85px;
            border-radius: 18px;
            text-decoration: none;
            color: #D06A80;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFD1DC;
            z-index: 10;
        }

        .ig-top-badge:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(208, 106, 128, 0.25);
            background: #FFE3E8;
        }
    </style>
</head>
<body>

    <!-- Native Audio Source Link -->
    <audio id="bg-music" loop src="https://archive.org/download/weezer-2010-01-20-liveintallahassee/Island%20in%20the%20Sun.mp3"></audio>

    <!-- Top Right Native Button Widget -->
    <div class="music-widget">
        <button class="music-btn" id="musicBtn">
            🎵 <span>PLAY MUSIC</span>
        </button>
    </div>

    <a href="https://instagram.com" target="_blank" class="ig-top-badge" aria-label="Instagram Profile">
        <span style="font-size: 0.75rem; font-weight: bold;">Instagram</span>
    </a>

    <header>
        <h1 style="color: #D06A80; font-size: 2.5rem; margin-bottom: 10px;">Momo Dog Sitting</h1>
        <p>Loving care when you're not there 🐾</p>
    </header>

    <script>
        const musicBtn = document.getElementById('musicBtn');
        const bgMusic = document.getElementById('bg-music');
        const btnText = musicBtn.querySelector('span');

        musicBtn.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('playing');
                    btnText.textContent = 'PAUSE MUSIC';
                }).catch(err => {
                    alert("Audio failed to stream. You can also replace line 73 with your own local MP3 filename!");
                    console.error("Playback failed:", err);
                });
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
                btnText.textContent = 'PLAY MUSIC';
            }
        });
    </script>
</body>
</html>
