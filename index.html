<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #FFF5F6;
            color: #4A4A4A;
        }

        header {
            background-color: #FFD1DC;
            text-align: center;
            padding: 70px 20px 60px 20px;
            position: relative;
        }

        /* --- Floating Music Player Widget --- */
        .music-widget {
            position: fixed;
            top: 25px;
            right: 130px; 
            z-index: 100;
            background: #FFF0F2;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            border: 2px solid #FFD1DC;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 200px;
        }

        .music-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #D06A80;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* --- Instagram Badge --- */
        .ig-top-badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #FFF0F2;
            width: 85px;
            height: 85px;
            border-radius: 18px;
            text-decoration: none;
            color: #D06A80;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #FFD1DC;
            z-index: 10;
        }

        .ig-top-badge:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(208, 106, 128, 0.25);
        }

        .puppy-head-container {
            position: relative;
            width: 22px;
            height: 16px;
            margin-bottom: 6px;
        }

        .puppy-icon {
            width: 22px;
            height: 16px;
            background: #C49A82; 
            border-radius: 10px 10px 6px 6px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .puppy-icon::before, .puppy-icon::after {
            content: '';
            position: absolute;
            background: #8B5A42; 
            width: 6px;
            height: 11px;
            border-radius: 4px;
            top: 0;
        }
        .puppy-icon::before { left: -4px; transform: rotate(-10deg); }
        .puppy-icon::after { right: -4px; transform: rotate(10deg); }

        .puppy-nose {
            position: absolute;
            width: 4px;
            height: 3px;
            background: #333333;
            border-radius: 50%;
            bottom: 3px;
            left: 9px;
            z-index: 5;
        }

        .ig-handle-text {
            font-size: 0.9rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
        }

        header h1 {
            color: #D06A80;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        header .subtitle {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #6B6B6B;
        }

        header .tagline {
            font-size: 1rem;
            color: #8C8C8C;
        }

        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 1.5rem;
            color: #6B6B6B;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .puppy-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 60px;
        }

        .puppy-card {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .puppy-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .puppy-card h3 {
            font-size: 1.3rem;
            color: #6B6B6B;
            margin-bottom: 10px;
        }

        .puppy-card p {
            font-size: 0.95rem;
            color: #8C8C8C;
            line-height: 1.4;
        }

        .booking-container {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #6B6B6B;
            font-size: 0.95rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #EAEAEA;
            border-radius: 10px;
            font-size: 1rem;
            color: #4A4A4A;
            background-color: #FAFAFA;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #FFD1DC;
            background-color: #FFFFFF;
        }

        .form-group textarea {
            resize: vertical;
            height: 120px;
        }

        .submit-btn {
            width: 100%;
            background-color: #F0C4CE;
            color: #4A4A4A;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 10px;
            text-align: center;
        }

        .submit-btn:hover {
            background-color: #E8B5C0;
        }

        .info-container {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto 60px auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .price-list {
            list-style: none;
            margin-bottom: 25px;
            color: #555555;
            font-size: 1.05rem;
            line-height: 1.8;
        }

        .price-list strong {
            color: #4A4A4A;
        }

        .venmo-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #FFF0F3;
            border: 2px solid #FFD1DC;
            border-radius: 20px;
            padding: 12px 25px;
            gap: 15px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .venmo-link-btn:hover {
            background-color: #FFE3E8;
            transform: translateY(-2px);
        }

        .pink-dollar-icon {
            background-color: #FFD1DC;
            color: #D06A80;
            font-weight: 700;
            font-size: 1.4rem;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(208, 106, 128, 0.2);
        }
