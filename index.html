<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momo Dog Sitting</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #FFF5F6; color: #4A4A4A; }
        header { background-color: #FFD1DC; text-align: center; padding: 70px 20px 60px 20px; position: relative; }

        /* Music & IG Buttons */
        .header-btn {
            position: absolute;
            top: 25px;
            width: 85px;
            height: 85px;
            border-radius: 18px;
            background: #FFF0F2;
            border: 2px solid #FFD1DC;
            box-shadow: 0 6px 16px rgba(208, 106, 128, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #D06A80;
            cursor: pointer;
            z-index: 10;
        }
        #musicToggle { left: 25px; font-size: 0.8rem; font-weight: 700; }
        .ig-top-badge { right: 25px; }

        .puppy-head-container { position: relative; width: 22px; height: 16px; margin-bottom: 6px; }
        .puppy-icon { width: 22px; height: 16px; background: #C49A82; border-radius: 10px 10px 6px 6px; position: absolute; top: 0; left: 0; }
        .puppy-icon::before, .puppy-icon::after { content: ''; position: absolute; background: #8B5A42; width: 6px; height: 11px; border-radius: 4px; top: 0; }
        .puppy-icon::before { left: -4px; transform: rotate(-10deg); }
        .puppy-icon::after { right: -4px; transform: rotate(10deg); }
        .puppy-nose { position: absolute; width: 4px; height: 3px; background: #333333; border-radius: 50%; bottom: 3px; left: 9px; z-index: 5; }
        .ig-handle-text { font-size: 0.9rem; font-weight: 700; line-height: 1.1; text-align: center; }

        header h1 { color: #D06A80; font-size: 2.5rem; margin-bottom: 15px; }
        header .subtitle { font-size: 1.2rem; font-weight: 600; margin-bottom: 10px; color: #6B6B6B; }
        header .tagline { font-size: 1rem; color: #8C8C8C; }

        main { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .section-title { text-align: center; font-size: 1.5rem; color: #6B6B6B; margin-bottom: 30px; }
        .puppy-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-bottom: 60px; }
        .puppy-card { background: #FFFFFF; border-radius: 20px; padding: 20px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .puppy-card img { width: 100%; height: 260px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .puppy-card h3 { font-size: 1.3rem; color: #6B6B6B; margin-bottom: 10px; }
        .puppy-card p { font-size: 0.95rem; color: #8C8C8C; }

        .booking-container { background: #FFFFFF; border-radius: 24px; padding: 40px; max-width: 600px; margin: 0 auto 30px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #6B6B6B; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; border: 1px solid #EAEAEA; border-radius: 10px; background-color: #FAFAFA; }
        .submit-btn { width: 100%; background-color: #F0C4CE; border: none; padding: 15px; font-weight: 600; border-radius: 30px; cursor: pointer; }
        
        .info-container { background: #FFFFFF; border-radius: 24px; padding: 30px; max-width: 600px; margin: 0 auto 60px auto; text-align: center; }
        .venmo-link-btn { display: inline-flex; align-items: center; justify-content: center; background: #FFF0F3; border: 2px solid #FFD1DC; border-radius: 20px; padding: 12px 25px; gap: 15px; text-decoration: none; color: #D06A80; font-weight: 700; }
        
        footer { text-align: center; padding: 40px 20px; color: #6B6B6B; }
        footer a { color: #D06A80; }

        @media (max-width: 600px) {
            header { padding-top: 120px; }
            #musicToggle, .ig-top-badge { top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div id="musicToggle" class="header-btn">
            <span>🎵</span>
            <span>Play</span>
        </div>

        <a href="instagram://user?username=Gracie.kimmie" id="igBtn" class="header-btn ig-top-badge">
            <div class="puppy-head-container">
                <div class="puppy-icon"></div>
                <div class="puppy-nose"></div>
            </div>
            <div class="ig-handle-text">Gracie.<br>kimmie</div>
        </a>

        <h1>🐶 Momo Dog Sitting</h1>
        <div class="subtitle">Where puppies will feel at home in downtown Bellevue!</div>
    </header>

    <main>
        <h2 class="section-title">✨ VIP Puppies ✨</h2>
        <section class="puppy-grid">
            <div class="puppy-card">
                <img src="mocha.jpg" alt="Mocha" onerror="this.src='https://images.unsplash.com/photo-1596492784531-6e6eb5ea9993?auto=format&fit=crop&q=80&w=400'">
                <h3>Mocha</h3>
            </div>
            <div class="puppy-card">
                <img src="toto.jpg" alt="Toto" onerror="this.src='https://images.unsplash.com/photo-1612536057832-2ff7eed58194?auto=format&fit=crop&q=80&w=400'">
                <h3>Toto</h3>
            </div>
        </section>

        <h2 class="section-title">📅 Booking Request</h2>
        <section class="booking-container">
            <form id="bookingForm">
                <div class="form-group"><label>Your Name</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Puppy's Name</label><input type="text" id="puppy-name" required></div>
                <div class="form-group"><label>Check-In Date</label><input type="date" id="check-in" required></div>
                <div class="form-group"><label>Check-Out Date</label><input type="date" id="check-out" required></div>
                <div class="form-group"><label>Special Notes</label><textarea id="notes"></textarea></div>
                <button type="submit" class="submit-btn">Email me these booking details ✉️</button>
            </form>
        </section>

        <h2 class="section-title">💰 Pricing & Rates</h2>
        <section class="info-container">
            <p>Overnight: $60/night | Daily Visit: $40</p>
            <br>
            <a href="venmo://paycharge?txn=pay&recipients=gracedkim" id="venmoBtn" class="venmo-link-btn">Pay with Venmo</a>
        </section>
    </main>

    <audio id="bgMusic" loop>
        <source src="https://archive.org/download/Weezer_2021-09-03/14%20Island%20In%20The%20Sun.mp3" type="audio/mpeg">
    </audio>

    <script>
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        let isPlaying = false;

        musicToggle.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                musicToggle.innerHTML = '<span>🎵</span><span>Play</span>';
            } else {
                bgMusic.play();
                musicToggle.innerHTML = '<span>⏸️</span><span>Pause</span>';
            }
            isPlaying = !isPlaying;
        });

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const puppy = document.getElementById('puppy-name').value;
            const body = `Hi Grace, I'd like to book ${puppy}.`;
            window.location.href = `mailto:grace.de.kim@gmail.com?subject=Booking&body=${encodeURIComponent(body)}`;
        });
    </script>
</body>
</html>
